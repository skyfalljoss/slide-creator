name: slideforge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: slideforge
      POSTGRES_USER: slideforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slideforge -d slideforge"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    mem_limit: 1g
    cpus: 1.0

  onlyoffice:
    image: onlyoffice/documentserver:9.4.0.1
    restart: unless-stopped
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:?Set ONLYOFFICE_JWT_SECRET in .env}
      ALLOW_PRIVATE_IP_ADDRESS: "true"
    shm_size: 2gb
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost/healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    volumes:
      - onlyoffice-data:/var/www/onlyoffice/Data
      - onlyoffice-logs:/var/log/onlyoffice
      - onlyoffice-lib:/var/lib/onlyoffice
      - onlyoffice-db:/var/lib/postgresql
    mem_limit: 4g
    cpus: 2.0

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://slideforge:${POSTGRES_PASSWORD}@postgres:5432/slideforge
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      LOCAL_DECK_FILE_DIR: /app/.data/deck-files
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCS_BUCKET: ${GCS_BUCKET:-}
      ONLYOFFICE_ENABLED: "true"
      ONLYOFFICE_PUBLIC_URL: ${ONLYOFFICE_PUBLIC_URL:-http://localhost/onlyoffice}
      ONLYOFFICE_INTERNAL_URL: http://onlyoffice
      ONLYOFFICE_API_URL: http://backend:8000
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET}
      LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
      onlyoffice:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - deck-files:/app/.data/deck-files
    mem_limit: 2g
    cpus: 2.0

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_APP_URL:-http://localhost}/api/v1
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
      onlyoffice:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.5

volumes:
  postgres-data:
  onlyoffice-data:
  onlyoffice-logs:
  onlyoffice-lib:
  onlyoffice-db:
  deck-files:
